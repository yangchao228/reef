services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reef
      POSTGRES_USER: reef
      POSTGRES_PASSWORD: reef
    ports:
      - "5432:5432"
    volumes:
      - reef-postgres-data:/var/lib/postgresql/data
      - ./frontend/db/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://reef:reef@db:5432/reef
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  reef-postgres-data:
